fragment PaymentRequestFields on PaymentRequest {
    waitToken
    amount
    currency
    status {
        status
    }
    createdAt
    resultingPaymentId
    transactionSwishDetails {
        errorCode
        returnUrl
        qrCode
    }
    transactionCreditCardDetails {
        sessionId
        sessionUrl
    }
    transactionMobilePayDetails {
        sessionId
        sessionUrl
    }
    transactionVippsDetails {
        sessionId
        sessionUrl
    }
    transactionBankTransferDetails {
        payUrl
    }
}
